<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Locked</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md text-center">
        <h2 class="text-2xl font-bold text-red-600 mb-4">Too Many Failed Attempts</h2>
        <p class="text-gray-700">For security reasons, your account access has been temporarily locked due to multiple failed login attempts.</p>
        <p class="text-gray-700 mt-4 font-semibold">Please try again in a few minutes.</p>
    </div>
</body>
</html>
