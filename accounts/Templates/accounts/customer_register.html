{% extends "base.html" %}
{% block content %}

<div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow">

    <h2 class="text-2xl font-bold mb-6 text-green-700">
        Register as a Customer
    </h2>

    <form method="post" class="space-y-4">
        {% csrf_token %}

        <!-- Account Type -->
        <label class="block">
            <span class="text-gray-700 font-semibold">Account Type</span>
            <select name="account_type" class="w-full border p-2 rounded mt-1" required>
                <option value="">Select an option</option>
                <option value="individual">Individual</option>
                <option value="community_group">Community Group</option>
                <option value="restaurant">Restaurant</option>
            </select>
        </label>

        <!-- Contact Name -->
        <input type="text" name="contact_name" placeholder="Full Name"
               class="w-full border p-2 rounded" required>

        <!-- Email -->
        <input type="email" name="email" placeholder="Email"
               class="w-full border p-2 rounded" required>

        <!-- Phone -->
        <input type="text" name="phone" placeholder="Phone Number"
               class="w-full border p-2 rounded" required>

        <!-- Delivery Address -->
        <textarea name="delivery_address" placeholder="Delivery Address"
                  class="w-full border p-2 rounded" required></textarea>

        <!-- Delivery Instructions -->
        <textarea name="delivery_instructions" placeholder="Delivery Instructions (optional)"
                  class="w-full border p-2 rounded"></textarea>

        <!-- Terms Agreement -->
        <label class="flex items-start">
            <input type="checkbox" name="agree_terms" class="mr-2 mt-1" required>
            <span>
                I agree to the
                <a href="{% url 'terms' %}" class="text-green-600 underline ml-1">
                    Terms & Conditions
                </a>
            </span>
        </label>

        <button class="w-full bg-green-600 text-white py-2 rounded">
            Create Customer Account
        </button>

    </form>

</div>

{% endblock %}
